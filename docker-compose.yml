services:
  spark:
    build: .
    ports:
      - "8889:8888"
      - "4041:4040"
    volumes:
      - ./data:/home/jovyan/work/data
      - ./spark:/home/jovyan/work/spark
      - ./warehouse:/home/jovyan/work/warehouse
      - ./agent:/home/jovyan/work/agent
    environment:
      - JUPYTER_ENABLE_LAB=yes
      - PATH=/opt/conda/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      - PYTHONPATH=/usr/local/spark-3.5.0-bin-hadoop3/python:/usr/local/spark-3.5.0-bin-hadoop3/python/lib/py4j-0.10.9.7-src.zip
      - SPARK_HOME=/usr/local/spark-3.5.0-bin-hadoop3
    command: start-notebook.sh --NotebookApp.token=''
    working_dir: /home/jovyan/work

  app:
    build: .
    ports:
      - "8501:8501"
    volumes:
      - .:/home/jovyan/work
    working_dir: /home/jovyan/work
    environment:
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    command: >
      bash -c "pip install streamlit plotly duckdb anthropic openai &&
               streamlit run app/streamlit_app.py --server.port 8501 --server.address 0.0.0.0"
    depends_on:
      - spark
